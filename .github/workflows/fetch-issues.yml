name: Fetch Issues

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:         # manual trigger from GitHub UI

# Prevent overlapping scheduled runs
concurrency:
  group: fetch-issues
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.fetch.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch issues from GitHub
        id: fetch
        shell: bash
        run: |
          set +e
          node scripts/fetch-issues.js
          code=$?
          if [ $code -eq 0 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ $code -eq 1 ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Fetch script failed with exit code $code — check logs above"
            exit $code
          fi
        env:
          ORG_GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}

      - name: Commit and push if data changed
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/issues.json
          git commit -m "chore: refresh issues data"
          git pull --rebase origin main
          git push

  build:
    needs: fetch
    if: needs.fetch.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # ensure we get the just-pushed commit

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
